<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Assignly</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">Assign<span>ly</span></div>
    </div>

    <div class="container login-container">
        <h2>Create an Account</h2>
        <form action="register.php" method="POST">
            <div class="form-group">
                <label>User ID (Student/Staff No)</label>
                <input type="number" name="userId" id="userId" placeholder="e.g. 1002" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" id="role" required>
                    <option value="Student">Student</option>
                    <option value="Supervisor">Supervisor</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Register Now</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='index.php'">Back to Login</button>
        </form>
    </div>
</body>
</html>
